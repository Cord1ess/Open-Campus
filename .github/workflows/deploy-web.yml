name: Deploy web to GitHub Pages

# Builds the Flutter web app and publishes it to GitHub Pages on every push to
# main (or manually via the Actions tab). The app talks to the hosted backend
# baked into lib/core/api/api_config.dart, so no secrets are needed here.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      - name: Build web
        working-directory: app
        run: flutter build web --release --base-href "/Open-Campus/"

      - name: Disable Jekyll (serve _-prefixed Flutter assets)
        run: touch app/build/web/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: app/build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
