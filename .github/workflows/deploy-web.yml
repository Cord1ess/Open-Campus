name: Deploy web to GitHub Pages

# Builds the Flutter web app and publishes it to GitHub Pages on every push to
# main (or manually via the Actions tab). The app talks to the hosted backend
# baked into lib/core/api/api_config.dart, so no secrets are needed here.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # Gate the deploy on the full test suite (backend pytest + app analyze/test).
  test:
    uses: ./.github/workflows/test.yml

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      - name: Build web
        working-directory: app
        # --wasm builds the skwasm renderer (dart2wasm), which renders off the
        # main thread and paces frames far better than canvaskit on high-refresh
        # displays — the fix for testers' "choppy on a 120Hz screen" reports. The
        # build also emits a dart2js + canvaskit fallback automatically, so
        # browsers without WASM-GC still work. (Unblocked by upgrading
        # flutter_secure_storage to v10, whose web package dropped dart:html.)
        #
        # NOTE: skwasm's multithreaded mode needs cross-origin isolation
        # (COOP/COEP headers) which GitHub Pages can't set, so on Pages it runs
        # single-threaded — still better-paced than canvaskit, but not full speed.
        # A host that allows those headers would unlock the multithreaded path.
        #
        # --no-web-resources-cdn keeps CanvasKit (the fallback) same-origin.
        run: flutter build web --wasm --release --no-web-resources-cdn --base-href "/Open-Campus/"

      - name: Disable Jekyll (serve _-prefixed Flutter assets)
        run: touch app/build/web/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: app/build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
