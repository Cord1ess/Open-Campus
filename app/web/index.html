<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <!-- REQUIRED on mobile: without this the page renders at ~980px desktop width
       and then zooms/reflows once Flutter loads (the "small then zooms in"
       glitch). viewport-fit=cover lets the app paint under the notch/status bar
       so the background is one continuous surface. -->
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="Open Campus: unofficial companion app for UIU's UCAM portal.">

  <!-- Warm DNS + TLS to the API host and the CanvasKit CDN before the app needs
       them, so the first data fetch and the renderer download don't each pay a
       fresh connection setup. -->
  <link rel="preconnect" href="https://open-campus-sdsw.onrender.com" crossorigin>
  <link rel="dns-prefetch" href="https://open-campus-sdsw.onrender.com">
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>

  <!-- White status/notification bar during load, matching the always-white boot
       loader below, so the bar reads as one continuous surface. Once Flutter
       boots it drives the bar color itself via AnnotatedRegion. -->
  <meta name="theme-color" content="#FFFFFF">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Open Campus">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Open Campus</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!-- Branded boot loader: shown immediately while the Flutter engine
       (main.dart.js + CanvasKit) actually downloads, so the real load is never a
       blank screen. An always-white screen with the brand icon centered, matching
       the in-app splash so when Flutter paints its own splash behind it the
       hand-off is seamless. Flutter removes #boot-loader on its first frame
       (flutter-first-frame), instantly — no fade — since the in-app splash is
       identical and already underneath. The bar is INDETERMINATE on purpose: the
       browser can't know the engine's total download size, so an honest
       "actively loading" bar beats a fake percentage. -->
  <style>
    /* Self-host Inter so the boot loader text (which paints before Flutter loads
       its own bundled Inter) is already in the app's typeface — one consistent
       font from the very first frame. Only the weights the loader uses. */
    @font-face { font-family: 'Inter'; font-style: normal; font-weight: 400;
      font-display: swap; src: url('fonts/Inter-Regular.ttf') format('truetype'); }
    @font-face { font-family: 'Inter'; font-style: normal; font-weight: 600;
      font-display: swap; src: url('fonts/Inter-SemiBold.ttf') format('truetype'); }
    @font-face { font-family: 'Inter'; font-style: normal; font-weight: 700;
      font-display: swap; src: url('fonts/Inter-Bold.ttf') format('truetype'); }
    /* Always white, regardless of the OS dark-mode setting — the loader is a
       clean white screen with the brand icon centered, matching the in-app
       splash so the hand-off to Flutter is seamless. */
    html, body { margin: 0; padding: 0; background: #FFFFFF; }
    #boot-loader {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; z-index: 9999;
      background: #FFFFFF; color: #14181F;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    /* The brand icon renders on its own (its blue+orange sit on the neutral boot
       surface). No colored tile behind it — the mark is never placed on an
       orange or blue background. */
    #boot-loader .logo {
      display: flex; align-items: center; justify-content: center; }
    #boot-loader .logo svg { width: 88px; height: 88px;
      filter: drop-shadow(0 8px 22px rgba(1,186,221,.20)); }
    #boot-loader .title {
      margin-top: 24px; font-size: 26px; font-weight: 700; letter-spacing: -.3px; }
    #boot-loader .desc {
      margin-top: 8px; font-size: 14px; opacity: .65; text-align: center;
      max-width: 280px; line-height: 1.45; }
    #boot-loader .bar {
      margin-top: 32px; width: 200px; height: 4px; border-radius: 999px;
      background: rgba(255,128,7,.18); overflow: hidden; position: relative; }
    #boot-loader .bar::before {
      content: ''; position: absolute; left: 0; top: 0; height: 100%;
      width: 40%; border-radius: 999px; background: #FF8007;
      animation: boot-slide 1.25s ease-in-out infinite; }
    @keyframes boot-slide {
      0%   { left: -40%; width: 40%; }
      50%  { left: 30%;  width: 55%; }
      100% { left: 100%; width: 40%; } }
  </style>
  <div id="boot-loader">
    <div class="logo">
      <!-- Open Campus icon (inlined so it paints before any asset request). -->
      <svg viewBox="0 0 158.87 167.64" xmlns="http://www.w3.org/2000/svg">
        <path d="M130.21 153.74c-13.2 8.38-28.16 13.01-43.47 13.9V76.83l43.46 20.99v55.93Z" fill="#f57f20"/>
        <path d="M55.37 43.3c19.1-13.53 44.43-11.7 61.35 4.06 4.04 3.77 7.36 8.12 9.9 12.85l32.25-13.07a84.3 84.3 0 0 0-17.78-24.4C126.72 9.05 107.49 1.12 87.78.11 46.44-2 10.22 26.22 1.75 66.68c-5.95 28.43 3.52 58.33 24.75 78.48 13.22 12.17 29.86 19.95 47.76 22.1v-34.03c-21.45-4.69-36.97-22.33-39.45-43.91-.02-3.7-.33-7.18.07-10.93 1.51-14.04 8.88-26.87 20.49-35.09Z" fill="#01badd"/>
      </svg>
    </div>
    <div class="title">Welcome to Open Campus</div>
    <div class="desc">Your campus made simple: results, attendance, routine and dues.</div>
    <div class="bar"></div>
  </div>
  <script>
    // Self-heal returning visitors: a previous deploy registered a service
    // worker (Flutter 3.44's self-unregistering SW) that can leave a stuck white
    // screen by serving stale, hash-mismatched assets. We no longer register one
    // (see flutter_bootstrap.js), but a cached SW lingers until killed — so on
    // every load, proactively unregister any service worker still controlling
    // this page. Harmless when none exist.
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (regs) {
        regs.forEach(function (r) { r.unregister(); });
      }).catch(function () {});
    }
    // Remove the boot loader the instant Flutter paints its first frame. No fade
    // — the in-app splash is identical and already painted underneath, so an
    // immediate removal is a seamless hand-off (and avoids any extra wait).
    window.addEventListener('flutter-first-frame', function () {
      var el = document.getElementById('boot-loader');
      if (el) el.remove();
    });
  </script>

  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
