name: open_campus
description: "Open Campus — unofficial companion app for UIU's UCAM portal."
publish_to: 'none'
version: 0.5.0+5

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  # State management
  flutter_riverpod: ^2.6.1
  # HTTP client
  dio: ^5.7.0
  # Secure token storage (Keychain/Keystore on mobile; in-memory/IndexedDB on web)
  # v10+ moved the web package to package:web/dart:js_interop, which is required
  # for the WASM (skwasm) renderer — v9's flutter_secure_storage_web imported
  # dart:html and blocked `flutter build web --wasm`.
  flutter_secure_storage: ^10.0.0
  # On-device last-view cache (the stateless-server model)
  shared_preferences: ^2.3.3
  # Browser APIs (Notification) for web — WASM-safe (dart:js_interop based)
  web: ^1.1.0
  # Charts for the data-dense dashboard
  fl_chart: ^0.69.2
  # Open external links (exam-routine Google Sheets, etc.)
  url_launcher: ^6.3.1
  flutter_local_notifications: ^22.0.1
  timezone: ^0.11.0
  # Renders the brand icon/logo SVGs crisply at any size (WASM-safe).
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/brand/
  fonts:
    # Inter, bundled as static weights (no italics) so the whole app renders in
    # one consistent typeface on every platform — no runtime font fetch.
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter-ExtraBold.ttf
          weight: 800
