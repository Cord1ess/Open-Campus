# Render Blueprint for the Open Campus backend.
# In the Render dashboard: New > Blueprint, point it at this repo. Render reads
# this file. The service builds from backend/Dockerfile.
#
# Set the Root Directory to "backend" when creating the service (or rely on the
# rootDir below if deploying the Blueprint from the repo root).
services:
  - type: web
    name: open-campus-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      # Generated by Render on first deploy; rotate anytime in the dashboard.
      - key: OC_SESSION_SECRET
        generateValue: true
      - key: OC_DEBUG
        value: "false"
      - key: OC_SESSION_TTL_MINUTES
        value: "60"
      - key: OC_PER_USER_MIN_INTERVAL_SECONDS
        value: "1.0"
      # Web build origin(s) as a JSON list. Leave unset for a native-only app.
      # Example: ["https://open-campus.pages.dev"]
      - key: OC_CORS_ORIGINS
        sync: false
