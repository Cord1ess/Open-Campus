[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
testpaths = tests
# Put backend/ (this file's dir) on sys.path so `from app...` imports resolve no
# matter where pytest is invoked from (repo root, CI, IDE) — not just after `cd
# backend`. Use importlib mode so tests aren't sensitive to __init__.py layout.
pythonpath = .
addopts = --import-mode=importlib --strict-markers --strict-config -ra
